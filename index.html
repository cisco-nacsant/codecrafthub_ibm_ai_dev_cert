<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CodeCraftHub: Your Learning Management Platform</title>
<style>
  /* Reset & base */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #171717;
    color: #FFFFFF;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2.75rem;
    color: #8B5CF6;
    margin-bottom: 8px;
    text-align: center;
    user-select: none;
    position: relative;
  }
  h1::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 4px;
    background: linear-gradient(90deg, #8B5CF6, #F59E0B);
    border-radius: 2px;
  }
  /* Container */
  #app {
    width: 100%;
    max-width: 960px;
  }
  /* Form styles */
  form#add-course-form {
    background: #262626;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
    box-shadow: 0 8px 24px rgb(139 92 246 / 0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 24px;
  }
  form#add-course-form > * {
    font-size: 1rem;
  }
  form#add-course-form label {
    display: flex;
    flex-direction: column;
    color: #A3A3A3;
    font-weight: 600;
    user-select: none;
  }
  form#add-course-form input[type="text"],
  form#add-course-form input[type="date"],
  form#add-course-form select,
  form#add-course-form textarea {
    margin-top: 6px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1.5px solid #2F2F2F;
    background-color: #171717;
    color: #FFFFFF;
    font-size: 1rem;
    font-family: inherit;
    transition: border-color 0.3s ease;
    resize: vertical;
  }
  form#add-course-form input[type="text"]:focus,
  form#add-course-form input[type="date"]:focus,
  form#add-course-form select:focus,
  form#add-course-form textarea:focus {
    outline: none;
    border-color: #8B5CF6;
    box-shadow: 0 0 8px #8B5CF6;
  }
  form#add-course-form textarea {
    min-height: 72px;
    max-height: 140px;
  }
  form#add-course-form button {
    grid-column: 1 / -1;
    justify-self: center;
    background-color: #8B5CF6;
    color: #FFFFFF;
    border: none;
    padding: 14px 32px;
    font-weight: 700;
    font-size: 1.125rem;
    border-radius: 16px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    user-select: none;
    box-shadow: 0 4px 12px rgb(139 92 246 / 0.5);
  }
  form#add-course-form button:disabled {
    background-color: #5a3dbb;
    cursor: not-allowed;
    box-shadow: none;
  }
  form#add-course-form button:hover:not(:disabled),
  form#add-course-form button:focus:not(:disabled) {
    background-color: #a67fff;
    box-shadow: 0 6px 20px rgb(139 92 246 / 0.7);
    outline: none;
  }
  /* Messages */
  #message-container {
    margin-bottom: 24px;
    min-height: 28px;
    font-weight: 600;
    font-size: 1rem;
    text-align: center;
    user-select: none;
  }
  #message-container.success {
    color: #F59E0B;
  }
  #message-container.error {
    color: #EF4444;
  }
  /* Loading spinner */
  .spinner {
    border: 4px solid #2F2F2F;
    border-top: 4px solid #8B5CF6;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  /* Course list container */
  #courses-container {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap: 24px;
  }
  /* Course card */
  .course-card {
    background: #262626;
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: 0 6px 20px rgb(139 92 246 / 0.3);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    transition: box-shadow 0.3s ease;
  }
  .course-card:hover,
  .course-card:focus-within {
    box-shadow: 0 8px 28px rgb(139 92 246 / 0.6);
  }
  .course-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .course-name {
    font-size: 1.25rem;
    font-weight: 700;
    color: #8B5CF6;
    user-select: text;
  }
  .course-created {
    font-size: 0.875rem;
    color: #A3A3A3;
    user-select: text;
  }
  .course-description {
    font-size: 1rem;
    color: #FFFFFF;
    margin-bottom: 12px;
    white-space: pre-wrap;
    user-select: text;
  }
  .course-meta {
    font-size: 0.9rem;
    color: #A3A3A3;
    margin-bottom: 16px;
    user-select: text;
  }
  .course-meta span {
    display: inline-block;
    margin-right: 12px;
  }
  /* Status badge */
  .status-badge {
    padding: 4px 12px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.875rem;
    user-select: none;
    display: inline-block;
  }
  .status-not-started {
    background-color: #2F2F2F;
    color: #F59E0B;
  }
  .status-in-progress {
    background-color: #4B3BFF33;
    color: #8B5CF6;
  }
  .status-completed {
    background-color: #10b981;
    color: #FFFFFF;
  }
  /* Buttons container */
  .course-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }
  button.action-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 8px 16px;
    border-radius: 12px;
    transition: background-color 0.3s ease;
    user-select: none;
  }
  button.action-btn:focus-visible {
    outline: 3px solid #8B5CF6;
    outline-offset: 2px;
  }
  button.edit-btn {
    color: #8B5CF6;
  }
  button.edit-btn:hover,
  button.edit-btn:focus {
    background-color: #8B5CF6;
    color: #171717;
  }
  button.delete-btn {
    color: #EF4444;
  }
  button.delete-btn:hover,
  button.delete-btn:focus {
    background-color: #EF4444;
    color: #FFFFFF;
  }
  /* Modal overlay */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background-color: rgba(23, 23, 23, 0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 16px;
  }
  #modal-overlay.active {
    display: flex;
  }
  /* Modal content */
  #edit-modal {
    background: #262626;
    border-radius: 16px;
    max-width: 480px;
    width: 100%;
    padding: 24px;
    box-shadow: 0 8px 28px rgb(139 92 246 / 0.7);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  #edit-modal h2 {
    margin-top: 0;
    margin-bottom: 16px;
    color: #8B5CF6;
    font-weight: 700;
    font-size: 1.75rem;
    user-select: none;
  }
  #edit-modal form {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  #edit-modal label {
    display: flex;
    flex-direction: column;
    color: #A3A3A3;
    font-weight: 600;
    user-select: none;
  }
  #edit-modal input[type="text"],
  #edit-modal input[type="date"],
  #edit-modal select,
  #edit-modal textarea {
    margin-top: 6px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1.5px solid #2F2F2F;
    background-color: #171717;
    color: #FFFFFF;
    font-size: 1rem;
    font-family: inherit;
    transition: border-color 0.3s ease;
    resize: vertical;
  }
  #edit-modal input[type="text"]:focus,
  #edit-modal input[type="date"]:focus,
  #edit-modal select:focus,
  #edit-modal textarea:focus {
    outline: none;
    border-color: #8B5CF6;
    box-shadow: 0 0 8px #8B5CF6;
  }
  #edit-modal textarea {
    min-height: 72px;
    max-height: 140px;
  }
  #edit-modal .modal-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 16px;
    margin-top: 16px;
  }
  #edit-modal button {
    padding: 12px 28px;
    font-weight: 700;
    font-size: 1rem;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s ease;
  }
  #edit-modal button.save-btn {
    background-color: #8B5CF6;
    color: #FFFFFF;
    box-shadow: 0 4px 12px rgb(139 92 246 / 0.5);
  }
  #edit-modal button.save-btn:disabled {
    background-color: #5a3dbb;
    cursor: not-allowed;
    box-shadow: none;
  }
  #edit-modal button.save-btn:hover:not(:disabled),
  #edit-modal button.save-btn:focus:not(:disabled) {
    background-color: #a67fff;
    box-shadow: 0 6px 20px rgb(139 92 246 / 0.7);
    outline: none;
  }
  #edit-modal button.cancel-btn {
    background-color: #2F2F2F;
    color: #A3A3A3;
  }
  #edit-modal button.cancel-btn:hover,
  #edit-modal button.cancel-btn:focus {
    background-color: #444444;
    color: #FFFFFF;
    outline: none;
  }
  /* Responsive */
  @media (max-width: 600px) {
    form#add-course-form {
      grid-template-columns: 1fr;
    }
    #courses-container {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <h1>CodeCraftHub: Your Learning Management Platform</h1>
  <div id="app" role="main" aria-live="polite" aria-busy="false">
    <form id="add-course-form" aria-label="Add new course form" novalidate>
      <label for="name">Course Name <sup aria-hidden="true" style="color:#EF4444;">*</sup>
        <input type="text" id="name" name="name" required autocomplete="off" aria-required="true" />
      </label>
      <label for="target_date">Target Date <sup aria-hidden="true" style="color:#EF4444;">*</sup>
        <input type="date" id="target_date" name="target_date" required aria-required="true" />
      </label>
      <label for="description" style="grid-column: 1 / -1;">Description <sup aria-hidden="true" style="color:#EF4444;">*</sup>
        <textarea id="description" name="description" required aria-required="true" rows="3"></textarea>
      </label>
      <label for="status">Status <sup aria-hidden="true" style="color:#EF4444;">*</sup>
        <select id="status" name="status" required aria-required="true" >
          <option value="" disabled selected>Select status</option>
          <option value="Not Started">Not Started</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </label>
      <button type="submit" aria-label="Add course">Add Course</button>
    </form>

    <div id="message-container" role="alert" aria-live="assertive"></div>

    <div id="loading-indicator" aria-hidden="true" style="display:none;">
      <div class="spinner" aria-label="Loading"></div>
    </div>

    <section id="courses-container" aria-label="List of courses">
      <!-- Course cards inserted here -->
    </section>
  </div>

  <!-- Edit Modal -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title" tabindex="-1">
    <div id="edit-modal">
      <h2 id="edit-modal-title">Edit Course</h2>
      <form id="edit-course-form" novalidate>
        <label for="edit-name">Course Name <sup aria-hidden="true" style="color:#EF4444;">*</sup>
          <input type="text" id="edit-name" name="name" required autocomplete="off" aria-required="true" />
        </label>
        <label for="edit-target_date">Target Date <sup aria-hidden="true" style="color:#EF4444;">*</sup>
          <input type="date" id="edit-target_date" name="target_date" required aria-required="true" />
        </label>
        <label for="edit-description">Description <sup aria-hidden="true" style="color:#EF4444;">*</sup>
          <textarea id="edit-description" name="description" required aria-required="true" rows="3"></textarea>
        </label>
        <label for="edit-status">Status <sup aria-hidden="true" style="color:#EF4444;">*</sup>
          <select id="edit-status" name="status" required aria-required="true" >
            <option value="" disabled>Select status</option>
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </label>
        <div class="modal-buttons">
          <button type="button" class="cancel-btn" id="edit-cancel-btn">Cancel</button>
          <button type="submit" class="save-btn" aria-label="Save changes to course">Save</button>
        </div>
      </form>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const API_BASE = 'http://localhost:5000/api/courses';

  // DOM Elements
  const addForm = document.getElementById('add-course-form');
  const coursesContainer = document.getElementById('courses-container');
  const messageContainer = document.getElementById('message-container');
  const loadingIndicator = document.getElementById('loading-indicator');
  const modalOverlay = document.getElementById('modal-overlay');
  const editModal = document.getElementById('edit-modal');
  const editForm = document.getElementById('edit-course-form');
  const editCancelBtn = document.getElementById('edit-cancel-btn');

  // State
  let courses = [];
  let editingCourseId = null;

  // Utility: format date to readable string
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  // Utility: show message
  function showMessage(text, type = 'success') {
    messageContainer.textContent = text;
    messageContainer.className = type;
    setTimeout(() => {
      if (messageContainer.textContent === text) {
        messageContainer.textContent = '';
        messageContainer.className = '';
      }
    }, 5000);
  }

  // Utility: show loading
  function setLoading(isLoading) {
    if (isLoading) {
      loadingIndicator.style.display = 'block';
      document.getElementById('app').setAttribute('aria-busy', 'true');
    } else {
      loadingIndicator.style.display = 'none';
      document.getElementById('app').setAttribute('aria-busy', 'false');
    }
  }

  // Validate course fields (name, description, target_date, status)
  function validateCourseData(data) {
    const errors = [];
    if (!data.name || !data.name.trim()) errors.push('Name is required.');
    if (!data.description || !data.description.trim()) errors.push('Description is required.');
    if (!data.target_date || !/^\d{4}-\d{2}-\d{2}$/.test(data.target_date)) errors.push('Valid target date is required.');
    if (!data.status || !['Not Started', 'In Progress', 'Completed'].includes(data.status)) errors.push('Valid status is required.');
    return errors;
  }

  // Fetch all courses
  async function fetchCourses() {
    setLoading(true);
    try {
      const res = await fetch(API_BASE);
      if (!res.ok) throw new Error(`Failed to fetch courses: ${res.status} ${res.statusText}`);
      courses = await res.json();
      renderCourses();
      showMessage('Courses loaded successfully.', 'success');
    } catch (err) {
      showMessage(err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  // Render courses in cards
  function renderCourses() {
    coursesContainer.innerHTML = '';
    if (courses.length === 0) {
      coursesContainer.innerHTML = `<p style="color:#A3A3A3; text-align:center; user-select:none;">No courses available. Add a new course above.</p>`;
      return;
    }
    courses.forEach(course => {
      const card = document.createElement('article');
      card.className = 'course-card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `Course: ${course.name}, status: ${course.status}`);

      // Status badge class
      let statusClass = '';
      switch(course.status) {
        case 'Not Started': statusClass = 'status-not-started'; break;
        case 'In Progress': statusClass = 'status-in-progress'; break;
        case 'Completed': statusClass = 'status-completed'; break;
      }

      card.innerHTML = `
        <header class="course-header">
          <h3 class="course-name">${escapeHtml(course.name)}</h3>
          <time class="course-created" datetime="${course.created_at}">Created: ${formatDate(course.created_at)}</time>
        </header>
        <p class="course-description">${escapeHtml(course.description)}</p>
        <div class="course-meta">
          <span><strong>Target Date:</strong> ${escapeHtml(course.target_date)}</span>
          <span class="status-badge ${statusClass}">${escapeHtml(course.status)}</span>
        </div>
        <div class="course-actions">
          <button class="action-btn edit-btn" aria-label="Edit course ${escapeHtml(course.name)}" data-id="${course.id}">Edit</button>
          <button class="action-btn delete-btn" aria-label="Delete course ${escapeHtml(course.name)}" data-id="${course.id}">Remove</button>
        </div>
      `;

      coursesContainer.appendChild(card);
    });
  }

  // Escape HTML to prevent XSS
  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>"']/g, (m) => ({
      '&': '&amp;',
      '<': '<',
      '>': '>',
      '"': '&quot;',
      "'": '&#39;'
    })[m]);
  }

  // Add new course handler
  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMessage();

    const formData = new FormData(addForm);
    const newCourse = {
      name: formData.get('name').trim(),
      description: formData.get('description').trim(),
      target_date: formData.get('target_date'),
      status: formData.get('status')
    };

    const errors = validateCourseData(newCourse);
    if (errors.length > 0) {
      showMessage(errors.join(' '), 'error');
      return;
    }

    setLoading(true);
    disableForm(addForm, true);

    try {
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newCourse)
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.message || `Failed to add course: ${res.status} ${res.statusText}`);
      }
      const createdCourse = await res.json();
      courses.push(createdCourse);
      renderCourses();
      addForm.reset();
      showMessage('Course added successfully.', 'success');
    } catch (err) {
      showMessage(err.message, 'error');
    } finally {
      setLoading(false);
      disableForm(addForm, false);
    }
  });

  // Disable/enable form inputs and buttons
  function disableForm(form, disabled) {
    Array.from(form.elements).forEach(el => {
      el.disabled = disabled;
    });
  }

  // Clear message container
  function clearMessage() {
    messageContainer.textContent = '';
    messageContainer.className = '';
  }

  // Delegate edit and delete buttons
  coursesContainer.addEventListener('click', (e) => {
    if (e.target.matches('button.edit-btn')) {
      const id = e.target.getAttribute('data-id');
      openEditModal(id);
    } else if (e.target.matches('button.delete-btn')) {
      const id = e.target.getAttribute('data-id');
      confirmDeleteCourse(id);
    }
  });

  // Open edit modal and populate fields
  function openEditModal(id) {
    clearMessage();
    const course = courses.find(c => c.id == id);
    if (!course) {
      showMessage('Course not found.', 'error');
      return;
    }
    editingCourseId = id;
    editForm.reset();
    editForm.elements['name'].value = course.name;
    editForm.elements['description'].value = course.description;
    editForm.elements['target_date'].value = course.target_date;
    editForm.elements['status'].value = course.status;
    modalOverlay.classList.add('active');
    editForm.elements['name'].focus();
  }

  // Close edit modal
  function closeEditModal() {
    modalOverlay.classList.remove('active');
    editingCourseId = null;
    clearMessage();
  }

  // Cancel button closes modal
  editCancelBtn.addEventListener('click', (e) => {
    e.preventDefault();
    closeEditModal();
  });

  // Close modal on overlay click (but not on modal content)
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) {
      closeEditModal();
    }
  });

  // Close modal on Escape key
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
      closeEditModal();
    }
  });

  // Edit form submit handler
  editForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMessage();

    if (!editingCourseId) {
      showMessage('No course selected for editing.', 'error');
      return;
    }

    const formData = new FormData(editForm);
    const updatedCourse = {
      name: formData.get('name').trim(),
      description: formData.get('description').trim(),
      target_date: formData.get('target_date'),
      status: formData.get('status')
    };

    const errors = validateCourseData(updatedCourse);
    if (errors.length > 0) {
      showMessage(errors.join(' '), 'error');
      return;
    }

    setLoading(true);
    disableForm(editForm, true);

    try {
      const res = await fetch(`${API_BASE}/${editingCourseId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updatedCourse)
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.message || `Failed to update course: ${res.status} ${res.statusText}`);
      }
      const updated = await res.json();
      // Update local state
      const idx = courses.findIndex(c => c.id == editingCourseId);
      if (idx !== -1) {
        courses[idx] = updated;
        renderCourses();
      }
      showMessage('Course updated successfully.', 'success');
      closeEditModal();
    } catch (err) {
      showMessage(err.message, 'error');
    } finally {
      setLoading(false);
      disableForm(editForm, false);
    }
  });

  // Confirm and delete course
  async function confirmDeleteCourse(id) {
    clearMessage();
    const course = courses.find(c => c.id == id);
    if (!course) {
      showMessage('Course not found.', 'error');
      return;
    }
    const confirmed = confirm(`Are you sure you want to delete the course "${course.name}"? This action cannot be undone.`);
    if (!confirmed) return;

    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.message || `Failed to delete course: ${res.status} ${res.statusText}`);
      }
      // Remove from local state
      courses = courses.filter(c => c.id != id);
      renderCourses();
      showMessage('Course deleted successfully.', 'success');
    } catch (err) {
      showMessage(err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  // Initial fetch
  fetchCourses();

})();
</script>
</body>
</html>
